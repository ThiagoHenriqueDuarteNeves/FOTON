# pytest.ini - Configuração do Pytest
[pytest]
# Diretórios de teste
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --cov=agent
    --cov=backend
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70

# Markers customizados
markers =
    unit: Testes unitários
    integration: Testes de integração
    e2e: Testes end-to-end
    slow: Testes que demoram mais tempo
    llm: Testes que requerem LLM
    browser: Testes que usam browser

# Ignorar avisos específicos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout padrão para testes
timeout = 300

# Diretórios a ignorar
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    node_modules
    venv
    __pycache__

# Configuração de cobertura
[coverage:run]
source = agent,backend
omit = 
    */tests/*
    */venv/*
    */node_modules/*
    */__pycache__/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
